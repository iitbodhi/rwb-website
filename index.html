<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWB - Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                  url('https://images.unsplash.com/photo-1518655048521-f130df041f66?q=80&w=1920');
      background-size: cover;
      background-position: center;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 900px;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      letter-spacing: 8px;
      color: #d4a017;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .highlight {
      color: #d4a017;
    }

    .coming {
      margin-top: 30px;
      font-size: 22px;
      opacity: 0.8;
    }

    .date {
      margin-top: 10px;
      font-size: 48px;
      font-weight: 700;
      color: #d4a017;
    }

    .tagline {
      margin-top: 30px;
      font-size: 16px;
      letter-spacing: 3px;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 42px;
      }

      .date {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">R W B</div>

    <h1>
      RONIN <span class="highlight">WARRIORS</span><br>
      OF BENGAL
    </h1>

    <div class="coming">COMING SOON</div>
    <div class="date">04.04.2026</div>

    <div class="tagline">RIDE SAFE. RIDE MORE.</div>
  </div>
</body>
</html>
