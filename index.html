<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWB - Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow-x: hidden;
      padding: 20px;
    }

    body::after {
      content: "";
      position: absolute;
      width: 100%; height: 100%;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.05;
      pointer-events: none;
    }

    .container {
      max-width: 800px;
      width: 100%;
      animation: fadeIn 1.5s ease forwards;
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-img {
      width: 180px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 25px rgba(212,160,23,0.8));
    }

    .domain {
      font-size: 16px;
      letter-spacing: 4px;
      color: #d4a017;
      margin-bottom: 10px;
      font-weight: 600;
    }

    h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 25px;
    }

    .highlight {
      color: #d4a017;
      animation: flicker 3s infinite;
    }

    @keyframes flicker {
      0%,18%,22%,25%,53%,57%,100% { opacity: 1; }
      20%,24%,55% { opacity: 0.6; }
    }

    .coming {
      font-size: 14px;
      opacity: 0.7;
    }

    .date-center {
      font-size: 20px;
      font-weight: 700;
      color: #d4a017;
      margin: 10px 0 15px;
      letter-spacing: 2px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .time-box {
      border: 1px solid rgba(212,160,23,0.4);
      padding: 10px 12px;
      border-radius: 10px;
      min-width: 60px;
      backdrop-filter: blur(8px);
    }

    .time-box span {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #d4a017;
    }

    .time-box small {
      font-size: 9px;
      opacity: 0.6;
      letter-spacing: 1px;
    }

    .tagline {
      margin-top: 25px;
      font-size: 12px;
      letter-spacing: 3px;
      opacity: 0.6;
    }

    .music-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(212,160,23,0.15);
      border: 1px solid #d4a017;
      padding: 10px 14px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      z-index: 3;
    }

    @media (max-width: 768px) {
      .logo-img { width: 130px; }
      .time-box { min-width: 55px; }
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="logo.png" class="logo-img" alt="RWB Logo">

    <div class="domain">www.roninwb.in</div>

    <h1>
      RONIN <span class="highlight">WARRIORS</span> OF BENGAL
    </h1>

    <div class="coming">LAUNCHING IN</div>
    <div class="date-center">04.04.2026</div>

    <div class="countdown">
      <div class="time-box"><span id="days">0</span><small>DAYS</small></div>
      <div class="time-box"><span id="hours">0</span><small>HOURS</small></div>
      <div class="time-box"><span id="minutes">0</span><small>MINUTES</small></div>
      <div class="time-box"><span id="seconds">0</span><small>SECONDS</small></div>
    </div>

    <div class="tagline">RIDE SAFE. RIDE MORE.</div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="music-control" onclick="toggleMusic()">🔊 Sound</div>

  <script>
    const targetDate = new Date("April 4, 2026 00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const gap = targetDate - now;

      const d = Math.floor(gap / (1000 * 60 * 60 * 24));
      const h = Math.floor((gap / (1000 * 60 * 60)) % 24);
      const m = Math.floor((gap / (1000 * 60)) % 60);
      const s = Math.floor((gap / 1000) % 60);

      document.getElementById("days").innerText = d;
      document.getElementById("hours").innerText = h;
      document.getElementById("minutes").innerText = m;
      document.getElementById("seconds").innerText = s;
    }

    setInterval(updateCountdown, 1000);

    const music = document.getElementById("bgMusic");

    function toggleMusic() {
      if (music.paused) {
        music.play();
      } else {
        music.pause();
        music.currentTime = 0;
      }
    }

    document.addEventListener("click", () => {
      music.play().catch(() => {});
    }, { once: true });
  </script>

</body>
</html>
